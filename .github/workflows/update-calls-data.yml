name: Update EU calls data

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 06:10 UTC. Adjust if needed.
    - cron: "10 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-eu-calls-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh snapshot files
        run: npm run update-data

      - name: Commit updated snapshot if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update EU calls snapshot"
          file_pattern: "data/calls.json data/calls.manifest.json data/chunks/*.json public/data/calls.json public/data/calls.manifest.json public/data/chunks/*.json"
